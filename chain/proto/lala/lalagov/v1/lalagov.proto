syntax = "proto3";
package lala.lalagov.v1;

option go_package = "github.com/lala-protocol/whitepaper/prototype/lalachain/x/lalagov/types";

import "lala/aiadvisor/v1/aiadvisor.proto";

// ParameterChange records an applied parameter mutation.
message ParameterChange {
  string parameter = 1;
  int64  value     = 2;
}

// ResolvedProposal records the outcome of a governance vote.
message ResolvedProposal {
  lala.aiadvisor.v1.AIProposal proposal      = 1;
  string                       votes_approve = 2; // decimal string
  string                       votes_reject  = 3; // decimal string
  string                       outcome       = 4; // "passed" | "failed"
}

// GovConfig holds governance configuration parameters.
message GovConfig {
  string quorum               = 1; // decimal string
  string approval             = 2; // decimal string
  int64  voting_period_epochs = 3;
}

// GenesisState defines the lalagov module's genesis state.
message GenesisState {
  GovConfig                    config                    = 1;
  repeated string              whitelisted_advisory_keys = 2;
  repeated ResolvedProposal    history                   = 3;
}
